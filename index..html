<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム マルバツゲーム (P2P版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS: サーバーなしでブラウザ同士を直接つなぐ魔法のライブラリ -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .cell-x { color: #ef4444; } /* Red */
        .cell-o { color: #3b82f6; } /* Blue */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div id="app" class="glass-panel w-full max-w-md rounded-2xl shadow-2xl p-6 relative overflow-hidden">
        <h1 class="text-3xl font-bold text-center text-indigo-900 mb-6 tracking-wide">リアルタイム対戦<br>マルバツゲーム</h1>

        <!-- Loading / Status -->
        <div id="status-container" class="text-center mb-4 hidden">
            <p id="status-text" class="text-lg font-semibold text-gray-600">準備中...</p>
        </div>

        <!-- Room Entry UI -->
        <div id="lobby-ui" class="flex flex-col space-y-4 mt-2">
            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl">
                <h2 class="font-bold text-blue-800 mb-2">遊び方</h2>
                <ul class="text-sm text-blue-700 list-disc list-inside space-y-1">
                    <li>一人が好きな「合言葉」を決めて<b>「部屋を作る」</b>を押します。</li>
                    <li>もう一人は同じ合言葉を入力して<b>「部屋に入る」</b>を押します。</li>
                    <li>スマホとPCが直接繋がって対戦が始まります！</li>
                </ul>
            </div>
            <div>
                <label for="room-id" class="block text-sm font-medium text-gray-700 mb-1">合言葉 (半角英数字)</label>
                <input type="text" id="room-id" placeholder="例: secret123" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-lg font-medium text-center">
            </div>
            <div class="flex space-x-3">
                <button id="create-btn" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all active:scale-95">
                    部屋を作る
                </button>
                <button id="join-btn" class="w-1/2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all active:scale-95">
                    部屋に入る
                </button>
            </div>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden flex flex-col items-center w-full mt-2">
            
            <div class="flex justify-between w-full mb-4 px-2 items-end">
                <div class="flex flex-col">
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">あなたの記号</span>
                    <span id="player-symbol" class="text-3xl font-black">-</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">合言葉</span>
                    <div class="flex items-center gap-2">
                        <span id="current-room-display" class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">---</span>
                    </div>
                </div>
            </div>

            <!-- Game Board -->
            <div id="board" class="grid grid-cols-3 gap-3 w-full aspect-square bg-gray-300 p-3 rounded-xl shadow-inner mb-6">
                <!-- Cells will be generated by JS -->
            </div>

            <!-- Game Controls -->
            <div class="flex justify-center w-full space-x-4">
                <button id="reset-btn" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-full shadow-md transition-all active:scale-95">
                    もう一度遊ぶ
                </button>
                <button id="leave-btn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded-full shadow-md transition-all active:scale-95">
                    退出する
                </button>
            </div>
        </div>
    </div>

    <script>
        // State variables
        const GAME_PREFIX = 'simple-tictactoe-v1-';
        let peer = null;
        let conn = null;
        let isHost = false;
        let currentRoomId = null;
        let gameState = null;
        let mySymbol = null; // 'X' (Host) or 'O' (Guest)

        // DOM Elements
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const lobbyUI = document.getElementById('lobby-ui');
        const gameUI = document.getElementById('game-ui');
        const roomIdInput = document.getElementById('room-id');
        const createBtn = document.getElementById('create-btn');
        const joinBtn = document.getElementById('join-btn');
        const boardEl = document.getElementById('board');
        const playerSymbolEl = document.getElementById('player-symbol');
        const currentRoomDisplay = document.getElementById('current-room-display');
        const resetBtn = document.getElementById('reset-btn');
        const leaveBtn = document.getElementById('leave-btn');

        // Setup Board UI
        function createBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-300';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardEl.appendChild(cell);
            }
        }
        createBoard();

        // UI Helpers
        function showLobby() {
            statusContainer.classList.add('hidden');
            lobbyUI.classList.remove('hidden');
            gameUI.classList.add('hidden');
        }

        function showLoading(msg) {
            lobbyUI.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            statusText.textContent = msg;
            statusText.className = 'text-lg font-semibold text-indigo-600 animate-pulse';
        }

        function showGame() {
            lobbyUI.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            gameUI.classList.remove('hidden');
            currentRoomDisplay.textContent = currentRoomId;
        }

        function setStatus(msg, highlight = false) {
            statusText.textContent = msg;
            statusText.className = highlight 
                ? 'text-lg font-bold text-indigo-600 animate-pulse' 
                : 'text-lg font-semibold text-gray-600';
        }

        function initGameState() {
            gameState = {
                board: Array(9).fill(''),
                turn: 'X',
                players: { X: true, O: false }, // ホスト(X)は最初からいる
                winner: null
            };
        }

        // --- 部屋を作る（ホスト） ---
        createBtn.addEventListener('click', () => {
            let roomId = roomIdInput.value.trim();
            if (!roomId) {
                // 空欄ならランダムな6文字を生成
                roomId = Math.random().toString(36).substring(2, 8);
            }
            
            showLoading("部屋を作成中...");
            const peerId = GAME_PREFIX + roomId;
            
            peer = new Peer(peerId); // 指定したIDで待受け

            peer.on('open', (id) => {
                isHost = true;
                mySymbol = 'X';
                currentRoomId = roomId;
                initGameState();
                showGame();
                updateGameState();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("その合言葉はすでに他の人が使っています。別の言葉に変えてください。");
                } else {
                    alert("エラーが発生しました: " + err.type);
                }
                leaveRoom();
            });

            peer.on('connection', (connection) => {
                // ゲストが接続してきた時
                if (conn) {
                    // 既に人がいる場合は弾く
                    connection.send({ type: 'error', message: '部屋は満員です' });
                    setTimeout(() => connection.close(), 500);
                    return;
                }
                conn = connection;
                setupConnectionListeners();
                
                gameState.players.O = true; // ゲスト参加完了
                sendStateToGuest();
                updateGameState();
            });
        });

        // --- 部屋に入る（ゲスト） ---
        joinBtn.addEventListener('click', () => {
            const roomId = roomIdInput.value.trim();
            if (!roomId) {
                alert("合言葉を入力してください");
                return;
            }

            showLoading("部屋を探しています...");
            peer = new Peer(); // ゲストはランダムなIDでOK

            peer.on('open', (id) => {
                const hostPeerId = GAME_PREFIX + roomId;
                conn = peer.connect(hostPeerId, { reliable: true });

                conn.on('open', () => {
                    // ホストへの接続成功！
                    isHost = false;
                    mySymbol = 'O';
                    currentRoomId = roomId;
                    setupConnectionListeners();
                    showGame();
                });

                // 5秒経っても繋がらない場合はエラー扱いにする
                setTimeout(() => {
                    if (!isHost && !gameState) {
                        alert("部屋が見つかりません。ホストが「部屋を作る」を押しているか、合言葉が正しいか確認してください。");
                        leaveRoom();
                    }
                }, 5000);
            });

            peer.on('error', (err) => {
                alert("接続エラー: " + err.type);
                leaveRoom();
            });
        });

        // --- 通信のやり取り ---
        function setupConnectionListeners() {
            conn.on('data', (data) => {
                if (data.type === 'error') {
                    alert(data.message);
                    leaveRoom();
                } else if (data.type === 'state') {
                    // ホストから最新のゲーム状態を受け取った時（ゲスト用）
                    gameState = data.state;
                    updateGameState();
                } else if (data.type === 'move') {
                    // ゲストがマスをクリックしたという通知を受け取った時（ホスト用）
                    if (isHost && gameState.turn === 'O' && gameState.board[data.index] === '') {
                        gameState.board[data.index] = 'O';
                        gameState.winner = checkWin(gameState.board);
                        gameState.turn = 'X';
                        sendStateToGuest(); // 変更をゲストに送り返す
                        updateGameState();
                    }
                } else if (data.type === 'reset') {
                    // ゲストがリセットボタンを押した時（ホスト用）
                    if (isHost) {
                        initGameState();
                        gameState.players.O = true; // ゲストは居続ける
                        sendStateToGuest();
                        updateGameState();
                    }
                }
            });

            conn.on('close', () => {
                alert("相手との通信が切断されました。");
                leaveRoom();
            });
        }

        // ホストからゲストへ状態を送信
        function sendStateToGuest() {
            if (isHost && conn && conn.open) {
                conn.send({ type: 'state', state: gameState });
            }
        }

        // --- ゲームの画面更新 ---
        function updateGameState() {
            if (!gameState) return;

            // シンボルの表示
            playerSymbolEl.textContent = mySymbol === 'X' ? '✖️' : '◯';
            playerSymbolEl.className = mySymbol === 'X' ? 'text-3xl font-black cell-x' : 'text-3xl font-black cell-o';

            // 盤面の描画
            const cells = boardEl.children;
            for (let i = 0; i < 9; i++) {
                const val = gameState.board[i];
                if (val === 'X') {
                    cells[i].textContent = '✖️';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cell-x';
                } else if (val === 'O') {
                    cells[i].textContent = '◯';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cell-o';
                } else {
                    cells[i].textContent = '';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-300';
                }
            }

            // メッセージロジック
            resetBtn.classList.add('hidden');

            if (!gameState.players.O) {
                setStatus("相手の参加を待っています... (合言葉: " + currentRoomId + ")", true);
            } else if (gameState.winner) {
                resetBtn.classList.remove('hidden');
                if (gameState.winner === 'draw') {
                    setStatus("引き分け！");
                } else {
                    const isMe = gameState.winner === mySymbol;
                    setStatus(isMe ? "🎊 あなたの勝ち！ 🎊" : "💀 あなたの負け...");
                }
            } else {
                const isMyTurn = gameState.turn === mySymbol;
                if (isMyTurn) {
                    setStatus("あなたのターンです", true);
                } else {
                    setStatus("相手のターンです...");
                }
            }
        }

        // --- マスをクリックした時 ---
        function handleCellClick(index) {
            if (!gameState || !mySymbol) return;

            // ルールチェック
            if (gameState.winner) return; // ゲーム終了済み
            if (gameState.turn !== mySymbol) return; // 自分の番じゃない
            if (!gameState.players.O) return; // 相手がまだ来てない
            if (gameState.board[index] !== '') return; // すでに置かれている

            if (isHost) {
                // 自分がホストなら、自分で状態を更新して相手に送る
                gameState.board[index] = mySymbol;
                gameState.winner = checkWin(gameState.board);
                gameState.turn = 'O';
                sendStateToGuest();
                updateGameState();
            } else {
                // 自分がゲストなら、ホストに「ここに置きたい」とリクエストを送る
                if (conn && conn.open) {
                    conn.send({ type: 'move', index: index });
                }
            }
        }

        function checkWin(board) {
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
                [0, 4, 8], [2, 4, 6]             // diagonals
            ];
            for (let i = 0; i < lines.length; i++) {
                const [a, b, c] = lines[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (!board.includes('')) return 'draw';
            return null;
        }

        // --- リセットと退出 ---
        resetBtn.addEventListener('click', () => {
            if (isHost) {
                initGameState();
                gameState.players.O = true;
                sendStateToGuest();
                updateGameState();
            } else {
                // ゲストはホストにリセットを要求する
                if (conn && conn.open) {
                    conn.send({ type: 'reset' });
                }
            }
        });

        function leaveRoom() {
            if (conn) {
                conn.close();
                conn = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            currentRoomId = null;
            gameState = null;
            mySymbol = null;
            isHost = false;
            showLobby();
        }

        leaveBtn.addEventListener('click', leaveRoom);

    </script>
</body>
</html>
