<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム マルバツゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-x { color: #ef4444; } /* Red for X */
        .cell-o { color: #3b82f6; } /* Blue for O */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div id="app" class="glass-panel w-full max-w-md rounded-2xl shadow-2xl p-6 relative overflow-hidden">
        <h1 class="text-3xl font-bold text-center text-indigo-900 mb-6 tracking-wide">リアルタイム対戦<br>マルバツゲーム</h1>

        <!-- Loading / Status -->
        <div id="status-container" class="text-center mb-4">
            <p id="status-text" class="text-lg font-semibold text-gray-600 animate-pulse">初期化中...</p>
        </div>

        <!-- Room Entry UI -->
        <div id="lobby-ui" class="hidden flex flex-col space-y-4 mt-6">
            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl">
                <h2 class="font-bold text-blue-800 mb-2">遊び方</h2>
                <ul class="text-sm text-blue-700 list-disc list-inside space-y-1">
                    <li>適当な「合言葉（ルームID）」を決めて入力します。</li>
                    <li>対戦相手にも同じ合言葉を入力してもらいます。</li>
                    <li>同じ部屋に入るとリアルタイム対戦が始まります！</li>
                </ul>
            </div>
            <div>
                <label for="room-id" class="block text-sm font-medium text-gray-700 mb-1">合言葉 (ルームID)</label>
                <input type="text" id="room-id" placeholder="例: secret-room-123" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-lg font-medium text-center">
            </div>
            <button id="join-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all active:scale-95">
                部屋に入る / 作る
            </button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden flex flex-col items-center w-full mt-2">
            
            <div class="flex justify-between w-full mb-4 px-2 items-end">
                <div class="flex flex-col">
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Your Symbol</span>
                    <span id="player-symbol" class="text-3xl font-black">-</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Room ID</span>
                    <div class="flex items-center gap-2">
                        <span id="current-room-display" class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">---</span>
                    </div>
                </div>
            </div>

            <!-- Game Board -->
            <div id="board" class="grid grid-cols-3 gap-3 w-full aspect-square bg-gray-300 p-3 rounded-xl shadow-inner mb-6">
                <!-- Cells will be generated by JS -->
            </div>

            <!-- Game Controls -->
            <div class="flex justify-center w-full space-x-4">
                <button id="reset-btn" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-full shadow-md transition-all active:scale-95">
                    もう一度遊ぶ
                </button>
                <button id="leave-btn" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded-full shadow-md transition-all active:scale-95">
                    退出する
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment variables provided by Canvas
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-tictactoe-app';
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        } catch (e) {
            console.error("Firebase config parsing error", e);
        }

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State variables
        let currentUser = null;
        let currentRoomId = null;
        let roomUnsubscribe = null;
        let gameState = null;
        let mySymbol = null; // 'X' or 'O'

        // DOM Elements
        const statusText = document.getElementById('status-text');
        const lobbyUI = document.getElementById('lobby-ui');
        const gameUI = document.getElementById('game-ui');
        const roomIdInput = document.getElementById('room-id');
        const joinBtn = document.getElementById('join-btn');
        const boardEl = document.getElementById('board');
        const playerSymbolEl = document.getElementById('player-symbol');
        const currentRoomDisplay = document.getElementById('current-room-display');
        const resetBtn = document.getElementById('reset-btn');
        const leaveBtn = document.getElementById('leave-btn');

        // Setup Board UI
        function createBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-300';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                boardEl.appendChild(cell);
            }
        }
        createBoard();

        // 1. Authentication (CRITICAL RULE 3)
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                setStatus("認証に失敗しました。再読み込みしてください。", true);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                if (!currentRoomId) {
                    showLobby();
                }
            } else {
                currentUser = null;
            }
        });

        initAuth();

        // --- Core Logic ---

        function showLobby() {
            lobbyUI.classList.remove('hidden');
            gameUI.classList.add('hidden');
            setStatus("ルームIDを入力して参加してください。");
        }

        function showGame() {
            lobbyUI.classList.add('hidden');
            gameUI.classList.remove('hidden');
            currentRoomDisplay.textContent = currentRoomId;
        }

        function setStatus(msg, isError = false) {
            statusText.textContent = msg;
            if (isError) {
                statusText.classList.remove('text-gray-600', 'text-indigo-600', 'animate-pulse');
                statusText.classList.add('text-red-500');
            } else {
                statusText.classList.remove('text-red-500');
                statusText.classList.add('text-gray-600');
            }
        }

        joinBtn.addEventListener('click', async () => {
            const roomId = roomIdInput.value.trim();
            if (!roomId) {
                alert("ルームIDを入力してください。");
                return;
            }
            if (!currentUser) return;

            joinBtn.disabled = true;
            joinBtn.textContent = "接続中...";

            try {
                // Rule 1: Use strict public path for shared game rooms
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'tictactoe_rooms', roomId);
                const snap = await getDoc(roomRef);

                if (!snap.exists()) {
                    // Room doesn't exist, create it and become 'X'
                    await setDoc(roomRef, {
                        board: Array(9).fill(''),
                        turn: 'X',
                        players: { X: currentUser.uid, O: null },
                        winner: null,
                        lastUpdate: Date.now()
                    });
                } else {
                    // Room exists, try to join
                    const data = snap.data();
                    // If O is empty and I am not already X
                    if (!data.players.O && data.players.X !== currentUser.uid) {
                        await updateDoc(roomRef, {
                            'players.O': currentUser.uid,
                            lastUpdate: Date.now()
                        });
                    } else if (data.players.X !== currentUser.uid && data.players.O !== currentUser.uid) {
                        alert("この部屋はすでに満員です。別のルームIDを試してください。");
                        joinBtn.disabled = false;
                        joinBtn.textContent = "部屋に入る / 作る";
                        return;
                    }
                }

                currentRoomId = roomId;
                showGame();
                listenToRoom();

            } catch (error) {
                console.error("Join room error:", error);
                alert("エラーが発生しました。");
            } finally {
                joinBtn.disabled = false;
                joinBtn.textContent = "部屋に入る / 作る";
            }
        });

        // Real-time synchronization
        function listenToRoom() {
            if (!currentUser || !currentRoomId) return;

            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'tictactoe_rooms', currentRoomId);
            
            // Rule 3: Error callback required
            roomUnsubscribe = onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    gameState = docSnap.data();
                    updateGameState();
                } else {
                    // Room was deleted
                    leaveRoom();
                    alert("部屋が解散されました。");
                }
            }, (error) => {
                console.error("Snapshot error:", error);
                setStatus("通信エラーが発生しました。", true);
            });
        }

        function updateGameState() {
            if (!gameState) return;

            // Determine my symbol
            if (gameState.players.X === currentUser.uid) {
                mySymbol = 'X';
                playerSymbolEl.textContent = '✖️';
                playerSymbolEl.className = 'text-3xl font-black cell-x';
            } else if (gameState.players.O === currentUser.uid) {
                mySymbol = 'O';
                playerSymbolEl.textContent = '◯';
                playerSymbolEl.className = 'text-3xl font-black cell-o';
            } else {
                mySymbol = null; // Spectator (shouldn't happen in this basic logic but just in case)
            }

            // Update UI Board
            const cells = boardEl.children;
            for (let i = 0; i < 9; i++) {
                const val = gameState.board[i];
                if (val === 'X') {
                    cells[i].textContent = '✖️';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cell-x';
                } else if (val === 'O') {
                    cells[i].textContent = '◯';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cell-o';
                } else {
                    cells[i].textContent = '';
                    cells[i].className = 'w-full h-full bg-white rounded-lg shadow-sm text-5xl font-black flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-300';
                }
            }

            // Status Message Logic
            resetBtn.classList.add('hidden');
            statusText.classList.remove('animate-pulse');

            if (!gameState.players.O) {
                setStatus("相手の参加を待っています... (合言葉を共有してください)", false);
                statusText.classList.add('animate-pulse');
                statusText.classList.add('text-indigo-600');
            } else if (gameState.winner) {
                resetBtn.classList.remove('hidden');
                if (gameState.winner === 'draw') {
                    setStatus("引き分け！");
                } else {
                    const isMe = gameState.winner === mySymbol;
                    setStatus(isMe ? "🎊 あなたの勝ち！ 🎊" : "💀 あなたの負け...");
                }
            } else {
                const isMyTurn = gameState.turn === mySymbol;
                if (isMyTurn) {
                    setStatus("あなたのターンです", false);
                    statusText.classList.add('text-indigo-600', 'font-bold');
                } else {
                    setStatus("相手のターンです...", false);
                }
            }
        }

        async function handleCellClick(index) {
            if (!currentUser || !gameState || !mySymbol) return;

            // Checks before moving
            if (gameState.winner) return; // Game over
            if (gameState.turn !== mySymbol) return; // Not my turn
            if (!gameState.players.O) return; // Waiting for opponent
            if (gameState.board[index] !== '') return; // Cell already taken

            // Update local state copy to predict and check win
            const newBoard = [...gameState.board];
            newBoard[index] = mySymbol;

            const winner = checkWin(newBoard);
            const nextTurn = mySymbol === 'X' ? 'O' : 'X';

            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'tictactoe_rooms', currentRoomId);
                await updateDoc(roomRef, {
                    board: newBoard,
                    turn: nextTurn,
                    winner: winner,
                    lastUpdate: Date.now()
                });
            } catch (error) {
                console.error("Error making move:", error);
            }
        }

        function checkWin(board) {
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
                [0, 4, 8], [2, 4, 6]             // diagonals
            ];
            for (let i = 0; i < lines.length; i++) {
                const [a, b, c] = lines[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (!board.includes('')) return 'draw';
            return null;
        }

        resetBtn.addEventListener('click', async () => {
            if (!currentUser || !currentRoomId) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'tictactoe_rooms', currentRoomId);
                await updateDoc(roomRef, {
                    board: Array(9).fill(''),
                    winner: null,
                    turn: 'X', // X always starts new game
                    lastUpdate: Date.now()
                });
            } catch (error) {
                console.error("Error resetting game:", error);
            }
        });

        function leaveRoom() {
            if (roomUnsubscribe) {
                roomUnsubscribe();
                roomUnsubscribe = null;
            }
            
            // Note: In a full app, you might want to remove the player's UID from the players object here
            // using updateDoc. For this simple prototype, we just detach the UI.

            currentRoomId = null;
            gameState = null;
            mySymbol = null;
            showLobby();
        }

        leaveBtn.addEventListener('click', leaveRoom);

    </script>
</body>
</html>
